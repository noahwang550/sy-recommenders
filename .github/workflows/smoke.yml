name: Smoke (nightly)

# Heavier nightly run: the `notebooks` smoke marker downloads real datasets
# (Movielens 100k etc.) and exercises the training scripts end-to-end.
# GitHub runners have network, so these pass where offline containers cannot.
# Scheduled only -> never blocks a pull request. Also runnable on demand.
on:
  schedule:
    - cron: "17 6 * * *" # daily ~06:17 UTC (off-peak minute)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: CPU smoke tests (notebooks marker)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (CPU dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Guard numpy<2 pin
        run: |
          python -c "import numpy; v=numpy.__version__; assert int(v.split('.')[0]) < 2, f'numpy {v} leaked (needs <2)'; print('numpy', v)"

      - name: Smoke tests (needs network for real datasets)
        run: pytest tests -m "notebooks and not spark and not gpu" --disable-warnings --tb=short
